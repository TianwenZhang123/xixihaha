# P-Flow Default Configuration (Paper-Faithful)
# Paper: "P-Flow: Prompting Visual Effects Generation" (arXiv:2603.22091)
#
# NOTE: This config is designed for AutoDL 4090 with local Wan 2.1-T2V-1.3B.
# API key should be set via environment variable DASHSCOPE_API_KEY, NOT here.

# Video generation model settings
model:
  path: "/root/autodl-tmp/models/Wan2.1-T2V-1.3B-Diffusers"
  dtype: "bfloat16"
  device: "cuda"

# Video settings (paper: 480x832, 81 frames)
video:
  height: 480
  width: 832
  num_frames: 81
  fps: 16
  guidance_scale: 5.0
  num_inference_steps: 50

# Noise Prior Enhancement settings (paper Eq. 3-10)
noise_prior:
  alpha: 0.001            # Noise blending weight (Eq. 10)
  rho_s: 0.1             # Spatial SVD ratio: REMOVE top 10% spatial components
  rho_m: 0.9             # Temporal SVD ratio: KEEP top 90% temporal dynamics
  inversion_steps: 50    # Flow matching inversion steps

# Optimization settings (paper Algorithm 1)
optimization:
  i_max: 3              # Fixed iterations (paper uses 10, reduced for 1.3B model)
                         # NO early stopping — paper limitation explicitly stated

# VLM settings (Qwen3-VL-Flash via DashScope)
# API key is read from DASHSCOPE_API_KEY environment variable
vlm:
  model_name: "qwen-vl-max"    # Qwen3-VL-Flash on DashScope
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  temperature: 0.7
  max_tokens: 2048

# Historical trajectory settings (paper Section 3.5)
trajectory:
  max_videos_to_vlm: 3   # V_ref, V_{i-1}, V_i (vertical composite)

# Output settings
output:
  save_all_videos: true   # Save ALL iteration videos for offline evaluation
  save_composites: true   # Save VLM composite videos
  output_dir: "/root/autodl-tmp/outputs"

# Dataset paths (AutoDL)
# Videos (0.mp4 ~ 1002.mp4) and prompts files are directly inside root dir.
dataset:
  root: "/root/autodl-tmp/data/moviegen_bench"
  prompts_file: "MovieGenVideoBench.txt"
  prompts_csv: "MovieGenVideoBenchWithTag.csv"
