# Video Reproduction Configuration
# Adapted from P-Flow (arXiv:2603.22091) for video reproduction task
# Target: Single 4090 (24GB) — Wan2.1-1.3B fits entirely in VRAM

# ============================================================
# Model Configuration
# ============================================================
model:
  # Text-to-Video model: Wan 2.1-1.3B
  t2v_path: "/root/autodl-tmp/models/Wan2.1-T2V-1.3B-Diffusers"
  dtype: "bfloat16"
  # 1.3B model (~2.6GB bfloat16), fits comfortably on 4090 (24GB)
  # No CPU offload needed — full model stays on GPU

# ============================================================
# Video Generation Settings
# ============================================================
video:
  height: 480
  width: 832
  num_frames: 81       # 81 frames / 16fps ~ 5s
  fps: 16
  guidance_scale: 5.0
  num_inference_steps: 50

# ============================================================
# Noise Prior Enhancement
# ============================================================
# The noise prior encodes motion dynamics from the reference video.
# It provides directional guidance so the generated video's motion
# trajectory resembles the reference.
#
# Key parameter: alpha (blending weight)
#   eta = sqrt(alpha) * eta_temporal + sqrt(1-alpha) * eta_random
#
# alpha controls how much motion guidance the reference provides:
#   - 0.001 (P-Flow original): 0.03% motion hint, 99.97% random
#     → Suitable for effect transfer where you want diversity
#   - 0.1 (recommended for reproduction): ~32% motion, ~95% random
#     → Good balance of guidance and generation quality
#   - 0.3: stronger motion guidance, may constrain generation
#   - 0.5+: very strong guidance, risk of artifacts
#
# Try different values: start with 0.1, increase if motion doesn't match
noise_prior:
  alpha: 0.001         # P-Flow optimal (validated by ablation experiment)
  rho_s: 0.1           # Spatial SVD energy threshold
  rho_m: 0.9           # Temporal SVD energy threshold
  inversion_steps: 50  # Flow matching inversion steps
  guidance_scale: 1.0  # No guidance during inversion

# ============================================================
# Optimization Settings
# ============================================================
optimization:
  i_max: 10            # Fixed 10 iterations (NO early stopping)
  # Each iteration: generate video → VLM compares → refine prompt
  # Later iterations produce progressively better reproductions

# ============================================================
# VLM Settings (DashScope Qwen-VL)
# ============================================================
vlm:
  provider: "dashscope"
  model_name: "qwen-vl-max"
  api_key_env: "DASHSCOPE_API_KEY"
  temperature: 0.7
  max_tokens: 2048
  max_retries: 3

# ============================================================
# Historical Trajectory
# ============================================================
trajectory:
  max_videos_to_vlm: 3    # V_ref, V_{i-1}, V_i (vertical composite)
  keep_all_text_history: true
  composite_layout: "vertical"

# ============================================================
# Output Settings
# ============================================================
output:
  base_dir: "/root/autodl-tmp/outputs/video_reproduction"
  save_all_iterations: true
  save_composites: true

# ============================================================
# Hardware Configuration (Single 4090)
# ============================================================
hardware:
  gpu_type: "4090-24GB"
  num_gpus: 1
  # Timing estimate (single card, 1.3B model):
  #   Video generation: ~30-50s per video
  #   VLM inference (Qwen-VL): ~5-10s
  #   Total per iteration: ~40-60s
  #   Total per sample (10 iter): ~7-10 min
