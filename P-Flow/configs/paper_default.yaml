# P-Flow Paper-Faithful Configuration
# Paper: "P-Flow: Prompting Visual Effects Generation" (arXiv:2603.22091)
# Target: Single A800 (80GB) with CPU offload

# ============================================================
# Model Configuration (Section 3.6)
# ============================================================
model:
  # Text-to-Video model: Wan 2.1-14B
  t2v_path: "/root/autodl-tmp/models/Wan2.1-T2V-14B-Diffusers"
  # Image-to-Video model: Wan 2.1-14B I2V
  i2v_path: "/root/autodl-tmp/models/Wan2.1-I2V-14B-Diffusers"
  dtype: "bfloat16"
  # Single A800 with enable_model_cpu_offload
  # 14B model (~28GB bfloat16), peak VRAM ~40-50GB with cpu offload

# ============================================================
# Video Generation Settings (Section 3.6)
# ============================================================
video:
  height: 480
  width: 832
  num_frames: 81       # Paper: 81 frames
  fps: 16              # 81 frames / 16fps ~ 5s
  guidance_scale: 5.0
  num_inference_steps: 50

# ============================================================
# Noise Prior Enhancement (Section 3.3, Eq. 4-7)
# ============================================================
noise_prior:
  alpha: 0.001         # Blending weight (Eq. 7), paper: 0.001
  rho_s: 0.1           # Spatial SVD energy threshold (Eq. 4)
  rho_m: 0.9           # Temporal SVD energy threshold (Eq. 6)
  inversion_steps: 50  # Flow matching inversion steps
  guidance_scale: 1.0  # No guidance during inversion

# ============================================================
# Optimization Settings (Algorithm 1)
# ============================================================
optimization:
  i_max: 10            # Paper: fixed 10 iterations (NO early stopping)

# ============================================================
# VLM Settings (DashScope Qwen-VL)
# ============================================================
vlm:
  provider: "dashscope"
  model_name: "qwen-vl-max"
  api_key_env: "DASHSCOPE_API_KEY"
  temperature: 0.7
  max_tokens: 2048
  max_retries: 3

# ============================================================
# Historical Trajectory (Section 3.5)
# ============================================================
trajectory:
  max_videos_to_vlm: 3    # V_ref, V_{i-1}, V_i (vertical composite)
  keep_all_text_history: true
  composite_layout: "vertical"  # Paper: vertical stacking

# ============================================================
# Dataset Configuration (Section 4.1)
# ============================================================
dataset:
  name: "Open-VFX"
  root: "/root/autodl-tmp/datasets/Open-VFX"
  # Open-VFX dataset structure:
  #   videos/: Reference videos organized by effect category
  #   splits/: train.json, test.json
  #   metadata.json: Effect categories, video-prompt pairs

# ============================================================
# Evaluation Settings (Section 4.1)
# ============================================================
evaluation:
  metrics:
    - "FID-VID"          # Frechet Inception Distance for Video
    - "FVD"              # Frechet Video Distance
    - "Dynamic_Degree"   # Motion/visual transformation degree
  human_eval:
    num_annotators: 15
    num_samples: 100
    effects_types: 15
    protocol: "pairwise_comparison"

# ============================================================
# Output Settings
# ============================================================
output:
  base_dir: "/root/autodl-tmp/outputs/pflow"
  save_all_iterations: true
  save_composites: true
  save_metrics_per_sample: true

# ============================================================
# Hardware Configuration (Single A800)
# ============================================================
hardware:
  gpu_type: "A800-80GB"
  num_gpus: 1
  # Timing estimate (single card):
  #   Video generation: ~90-120s per video
  #   VLM inference (Qwen-VL): ~5-10s
  #   Total per iteration: ~100-130s
  #   Total per sample (10 iter): ~17-22 min
