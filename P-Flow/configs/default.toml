# P-Flow 默认配置文件
# 命令行传参会覆盖此文件中的值 (data_dir / caption_dir / output_dir 除外)

[paths]
model_path   = "models/Wan2.1-T2V-1.3B-Diffusers"
vlm_path     = "models/Qwen2.5-VL-7B-Instruct"
vlm_provider = "local"

[video]
height     = 480
width      = 832
num_frames = 81
fps        = 15

[inference]
seed             = 42
steps            = 30
guidance         = 5.0
inversion_steps  = 50
dtype            = "bfloat16"
use_fast_svd     = true
gpu_id           = 0       # GPU 索引 (-1=全部)

# ── L2: 噪声先验（svd=true 时自动开启 inversion + two-stage SVD + blend）──
[noise_prior]
svd       = true
alpha     = 0.004
rho_s     = 0.1
rho_m     = 0.9

# ── L2: sigmoid 自适应 α ──
[std_gate]
enabled = true
eta0    = 0.38    # sigmoid 中点 (η_std 均值)
kappa   = 20.0    # 斜率 (越大越陡)

# ── L2: 渐进多尺度 SVD ──
[progressive_svd]
enabled = true

# ── L3: Feature Injection ──
[fi]
enabled            = true
layers             = "mid"
lambda             = 0.10
schedule           = "middle_peak"
cache_mode         = "attention"
max_cache_step     = 30     # FI 缓存步数上限 (30=全, 14B建议23)

# ── L3: FI 门控 ──
[fi.quality_gate]
enabled = true
k       = 20.0

# ── L3: FI 自适应门控 ──
[fi.adaptive_gate]
enabled = true
temp    = 5.0
high    = 0.30

# ── LLM Prompt 改写已移除，caption 由外部预处理 ──
